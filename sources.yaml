# ─────────────────────────────────────────────────────────────
# Tier 1 — 기술 기준 소스 (operator_blog / open_infra)
# bias_risk: low | verification_required: false | direct_citation: true
# ─────────────────────────────────────────────────────────────
regular_sources:

  - id: apnic_blog
    name: "APNIC Blog"
    type: operator_blog
    url: "https://blog.apnic.net/feed/"
    collection_mode: rss
    bias_risk: low
    enabled: true
    max_articles_per_run: 10
    pretested: true             # RSS 확인 완료 (2026-06-29)
    notes: "BGP, Routing, Internet 운영. Tier 1 기술 기준 소스."
    category_hint:
      - "Backbone/Backhaul"
      - "IP Security"
      - "NetDevOps"

  - id: ripe_labs
    name: "RIPE Labs"
    type: operator_blog
    url: "https://labs.ripe.net/feed.xml"   # v0.6: 실제 RSS URL 확인 반영
    collection_mode: rss
    bias_risk: low
    enabled: true
    max_articles_per_run: 10
    pretested: true             # RSS 확인 완료 (2026-06-29)
    notes: "Internet measurement, routing, 운영 분석. Tier 1 기술 기준 소스."
    category_hint:
      - "Backbone/Backhaul"
      - "IP Security"

  - id: ocp_blog
    name: "OCP Blog"
    type: open_infra
    url: "https://www.opencompute.org/blog/rss"   # v0.6: 신규 추가, RSS 확인 완료
    collection_mode: rss
    body_extract: tavily_extract    # 개별 기사 페이지 403 차단 → Tavily Extract 사용
    bias_risk: low
    enabled: true
    max_articles_per_run: 10
    pretested: true             # RSS 확인 완료 (2026-06-29)
    notes: "DC NW, Open Infra, AI DC. Disaggregated/Open Networking 기술. Tier 1. 기사 페이지 403으로 Tavily Extract 사용."
    category_hint:
      - "DataCenter Network"
      - "Standards/Architecture"

  - id: kentik_blog
    name: "Kentik Blog"
    type: engineering_blog
    url: "https://www.kentik.com/blog/"
    collection_mode: blog_index       # HTML 인덱스 파싱 → Most Recent URL 추출
    body_extract: tavily_extract      # 본문 추출: Tavily Extract (없으면 MarkItDown fallback)
    bias_risk: medium
    verification_required: true
    enabled: true
    max_articles_per_run: 5
    pretested: true
    notes: "BGP, Outage, Observability. RSS 없음. 인덱스 파싱으로 최신 URL 추출 후 Tavily Extract로 본문 수집."
    article_base_url: "https://www.kentik.com"
    article_url_pattern: "/blog/"
    url_must_not_contain_any:
      - "/blog/author/"
      - "/blog/category/"
      - "/blog/tag/"
      - "/blog/page/"
    # 날짜 기준 수집 (max_article_age_days는 source_policy에서 상속)
    max_article_age_days: 30
    # 카테고리 필터 없음 — 블로그 홈에 노출되는 모든 최신 글 수집
    # (노이즈 제거는 review_script.py 단계에서 수행)
    category_hint:
      - "Backbone/Backhaul"
      - "IP Security"
      - "NetDevOps"


# ─────────────────────────────────────────────────────────────
# Tier 2 — 벤더 소스
# verification_required: true → Analysis Agent가 편향 검토 수행
# direct_citation: true (원문 링크 제공 가능하나 요약은 Vendor_Verification_Node 통과)
# ─────────────────────────────────────────────────────────────
vendor_sources:

  - id: cisco_networking_blog
    name: "Cisco Networking Blog"
    type: vendor_blog
    url: "https://blogs.cisco.com/networking/feed"   # v0.6: networking 전용 RSS 확인
    collection_mode: rss
    bias_risk: high
    verification_required: true
    enabled: true
    max_articles_per_run: 10
    pretested: true             # RSS 확인 완료 (2026-06-29)
    notes: "벤더 기술 동향. 편향 검증 필수. Tier 2."
    category_hint:
      - "Backbone/Backhaul"
      - "DataCenter Network"
      - "IP Security"
      - "NetDevOps"

  - id: nokia_blog
    name: "Nokia Blog"
    type: vendor_blog
    url: "https://www.nokia.com/blog/rss/"   # v0.6: RSS URL 확인, enabled: true로 변경
    collection_mode: rss
    body_extract: tavily_extract    # 개별 기사 페이지 403 차단 → Tavily Extract 사용
    bias_risk: high
    verification_required: true
    enabled: true                            # v0.6: 활성화 (이전 v0.5는 false)
    max_articles_per_run: 10
    pretested: true             # RSS 확인 완료 (2026-06-29)
    notes: "Telco, DC, AI/Cloud Network. Tier 2. 기사 페이지 403으로 Tavily Extract 사용."
    category_hint:
      - "Transport/DCI"
      - "Backbone/Backhaul"
      - "DataCenter Network"


# ─────────────────────────────────────────────────────────────
# Tier 3 — 뉴스 소스
# 역할: 트렌드 감지 (신호). 기술 사실 검증은 Tier 1 소스로 위임.
# direct_citation: false (링크 제공은 가능하나 뉴스레터 본문 인용 불가)
# ─────────────────────────────────────────────────────────────
news_sources:

  - id: lightreading
    name: "Light Reading"
    type: news_media
    url: "https://www.lightreading.com/rss.xml"   # v0.6: 신규 추가, RSS 확인 완료
    collection_mode: rss
    bias_risk: low
    verification_required: true
    direct_citation: false      # 트렌드 감지용 — 본문 인용 불가
    enabled: true
    max_articles_per_run: 10
    pretested: true             # RSS 확인 완료 (2026-06-29)
    notes: "Telco 산업 뉴스. 트렌드 감지용 신호 소스. Tier 3."
    category_hint:
      - "Backbone/Backhaul"
      - "Transport/DCI"
      - "Standards/Architecture"

  - id: techtarget_network_management
    name: "TechTarget Network Management"
    type: news_media
    url: "https://www.techtarget.com/searchnetworking/rss/Network-management-news-advice-and-technical-information.xml"
    collection_mode: rss
    bias_risk: low
    verification_required: true
    direct_citation: false      # 트렌드 감지용 — 본문 인용 불가
    enabled: true
    max_articles_per_run: 10
    pretested: true             # RSS 확인 완료 (2026-06-29)
    notes: "NetOps, Network Management, AIOps. 트렌드 감지용 신호 소스. Tier 3."
    category_hint:
      - "NetDevOps"
