# ─────────────────────────────────────────────────────────────
# 커뮤니티 소스 — MVP에서 제외 (Reddit → excluded_sources)
# ─────────────────────────────────────────────────────────────
community_sources: []


# ─────────────────────────────────────────────────────────────
# 레퍼런스 소스
# collect_by_default: false — 키워드 트리거 시만 조회
# ─────────────────────────────────────────────────────────────
reference_sources:

  - id: ietf_datatracker
    name: "IETF Datatracker"
    type: standard_reference
    url: "https://datatracker.ietf.org/api/v1/doc/document/"
    collection_mode: api
    collect_by_default: false
    enabled: true
    review_mode: standards_signal          # review_script 대상 아님 → standards_radar_script
    output_section: standardization_radar
    direct_citation: true
    max_lookup_results: 5                 # WG당 최신 1건 × 5 WG
    max_per_wg: 1
    max_article_age_days: 730             # 2년 이내 갱신 문서만
    api_params:
      limit: 15                           # WG별 fetch 여유분 (필터 후 1건 선택)
    exclude_doc_prefixes:
      - agenda-
      - minutes-
      - slides-
    trigger_keywords:
      - RFC
      - Internet-Draft
      - BGP
      - EVPN
      - SRv6
      - Segment Routing
      - Route Leak
    include_keywords:
      - bgp
      - evpn
      - vxlan
      - srv6
      - segment routing
      - is-is
      - ospf
      - route leak
      - routing
    wg_filter:
      - idr
      - bess
      - lsr
      - spring
      - grow
    wg_radar:
      idr:
        tech_area: "BGP"
        change_meaning: "BGP 확장·정책·Route Leak·Routing Security 논의 추적"
      bess:
        tech_area: "EVPN/VPN"
        change_meaning: "DC Fabric 및 VPN 서비스 구현 방향과 연결"
      lsr:
        tech_area: "IS-IS/OSPF"
        change_meaning: "Link State 라우팅·IGP 확장 동향과 연결"
      spring:
        tech_area: "Segment Routing"
        change_meaning: "SR-MPLS/SRv6 및 백본·기간망 아키텍처 전환 흐름"
      grow:
        tech_area: "Global Routing Ops"
        change_meaning: "글로벌 라우팅 운영 안정성·BGP 운영 실무와 연결"
    notes: >
      표준 변화 감지용 레퍼런스. 뉴스 기사 소스가 아님.
      standards_radar_script.py 로 표준화 레이더 섹션 생성.

  - id: tmforum_newsroom
    name: "TM Forum Newsroom"
    type: telco_framework_reference
    url: "https://www.tmforum.org/news-insight/newsroom"
    collection_mode: blog_index      # 정적 HTML 파싱 → 최신순 수집 (RSS 없음)
    body_extract: tavily_extract     # 본문: Tavily Extract 우선, 없으면 MarkItDown fallback
    collect_by_default: false
    enabled: true
    max_articles_per_run: 5
    max_article_age_days: 30
    pretested: true
    notes: "Autonomous Network, OSS/BSS, ODA. 정적 HTML 파싱으로 최신 뉴스룸 기사 수집."
    article_base_url: "https://www.tmforum.org"
    article_url_pattern: "/news-insight/newsroom/"
    url_must_not_contain_any:
      - "/news-insight/newsroom#"
    trigger_keywords:
      - Autonomous Network
      - Closed-loop Automation
      - Intent-based Networking
      - AIOps
      - Zero-touch
      - ODA
      - Open Digital Architecture


# ─────────────────────────────────────────────────────────────
# Tavily 카테고리 확장 검색 (v0.7)
# 역할: RSS/API 수집을 보완하는 카테고리별 최신 동향 탐색
# 원칙:
# ─────────────────────────────────────────────────────────────
# Expansion Search (Tavily) — semi-open Discovery
#   - RSS/API 수집 보조 · open discovery (include_domains 선택)
#   - quality gate 통과 → 01_raw/expansion/{category}/
#   - Review → review_script (01_raw 전체)
#   - gate 제외 로그 → logs/discovery/*.jsonl
# ─────────────────────────────────────────────────────────────
expansion_search:
  provider: "tavily"
  enabled: true
  mode: semi_open_discovery
  min_discovery_score: 3
  max_saved_per_category: 3
  max_total_results: 20
  default_topic: news
  default_time_range: month
  default_max_article_age_days: 45
  timeout_seconds: 10
  max_retries: 1

  default_exclude_domains:
    - wikipedia.org
    - wikimedia.org
    - medium.com
    - reddit.com
    - quora.com
    - linkedin.com
    - youtube.com
    - github.com
    - stackoverflow.com
    - pinterest.com
    - ietf.org
    - facebook.com
    - fb.com

  blocked_url_patterns:
    - /wiki/
    - /tag/
    - /tags/
    - /category/
    - /categories/
    - /author/
    - /authors/
    - /search/
    - /topics/
    - /event/
    - /events/
    - /webinar/
    - /whitepaper/
    - /product/
    - /solutions/

  failure_policy:
    on_timeout: "continue_without_expansion"
    on_error: "continue_without_expansion"

  trusted_domains:
    technical:
      - blog.apnic.net
      - labs.ripe.net
      - opencompute.org
      - blog.cloudflare.com
    vendor:
      - kentik.com
      - blogs.cisco.com
      - nokia.com
    news:
      - lightreading.com
      - techtarget.com
      - tmforum.org

  search_categories:

    - id: routing_ops
      name: "Routing/Internet Operations"
      query: "BGP route leak RPKI ASPA routing incident internet operations"
      topic: news
      time_range: month
      max_article_age_days: 45
      max_results: 10
      max_saved_per_category: 3
      vault_subdir: routing_ops
      include_domains: []

    - id: backbone_backhaul
      name: "Backbone/Backhaul"
      query: "peering IXP backbone subsea cable fiber cut network outage"
      topic: news
      time_range: month
      max_article_age_days: 45
      max_results: 8
      max_saved_per_category: 2
      vault_subdir: backbone_backhaul
      include_domains: []

    - id: datacenter_network
      name: "DataCenter Network"
      query: "AI fabric ethernet datacenter networking congestion telemetry RoCE"
      topic: general
      time_range: month
      max_article_age_days: 60
      max_results: 8
      max_saved_per_category: 3
      vault_subdir: datacenter_network
      include_domains: []

    - id: ip_security
      name: "IP Security"
      query: "routing security RPKI BGP hijack DNS DDoS network security operations"
      topic: news
      time_range: month
      max_article_age_days: 45
      max_results: 8
      max_saved_per_category: 2
      vault_subdir: ip_security
      include_domains: []

    - id: netdevops
      name: "NetDevOps"
      query: "network automation netdevops intent based networking telemetry config validation"
      topic: general
      time_range: month
      max_article_age_days: 60
      max_results: 10
      max_saved_per_category: 3
      vault_subdir: netdevops
      include_domains: []

    - id: standards_architecture
      name: "Standards/Architecture"
      query: "BGP EVPN SRv6 RPKI routing architecture draft RFC network standards"
      topic: general
      time_range: year
      max_article_age_days: 365
      max_results: 5
      max_saved_per_category: 2
      vault_subdir: standards_architecture
      include_domains:
        - labs.ripe.net
        - blog.apnic.net
        - opencompute.org


# ─────────────────────────────────────────────────────────────
# Fallback 설정
# 전체 소스 수집 실패 시 로컬 샘플 데이터 사용
# ─────────────────────────────────────────────────────────────
fallback:
  enabled: true
  path: "data/sample_articles.json"
  trigger: "all_sources_failed"


# ─────────────────────────────────────────────────────────────
# 보류 소스 (MVP 이후 검토 대상)
# ─────────────────────────────────────────────────────────────
deferred_sources:
  - id: ciena_blog
    name: "Ciena Blog"
    type: vendor_blog
    url: "https://www.ciena.com/insights/list?type=articles"
    collection_mode: tavily_search
    bias_risk: medium
    enabled: false
    notes: "Optical/DCI. RSS 없음. Tavily 수집 가능 여부 확인 필요. MVP 이후 검토."
    tavily_query: "ciena blog DCI optical network 2026"

  - id: tmforum_autonomous_networks_hub
    name: "TM Forum Autonomous Networks Hub"
    type: telco_framework_reference
    url: "https://www.tmforum.org/autonomous-networks-project/"
    collection_mode: tavily_search
