# sources.yaml
# Multi-Agent 기반 IP Network 기술 동향 뉴스레터 — MVP
# v0.6 (소스 검증 결과 반영 — 2026-06-29)
#
# 역할: Research Agent Tool이 읽는 소스 설정 파일
#   - 수집 대상 URL / 방식 / 편향 위험 정의
#   - 카테고리별 키워드 정의 (Analysis Agent의 분류 기준)
#   - Tavily 조건부 보강 설정 (카테고리 공백 시만)
#   - Fallback 샘플 데이터 경로
#
# v0.6 변경 사항 (소스 검증 결과 반영):
#   - RIPE Labs: URL → labs.ripe.net/feed.xml (RSS 확인), collection_mode → rss
#   - Kentik Blog: RSS 없음 → collection_mode: tavily_search
#   - OCP Blog: 신규 추가 (RSS 확인 — opencompute.org/blog/rss)
#   - Cisco Blog: URL → blogs.cisco.com/networking/feed (RSS 확인)
#   - Nokia Blog: 활성화 (enabled: true) + RSS URL → nokia.com/blog/rss/
#   - Arista Blog / Juniper Blog: excluded_sources로 이동 (RSS·직접 수집 불가)
#   - IETF Datatracker: URL → API 엔드포인트 (api/v1/doc/document/)
#   - TM Forum: URL → tmforum.org/news-insight/newsroom (Tavily 대상)
#   - 신규: news_sources 섹션 (Light Reading, TechTarget Network Management)
#   - 신규: community_sources 섹션 (Reddit r/networking — enabled: false)
#   - v0.7: Reddit community_sources 제외 → excluded_sources 로 이동
#   - Ciena Blog: deferred_sources로 이동 (RSS 없음, Tavily 후보)
#
# v0.5 제거 항목 (계속 유지):
#   - node_policies (코드에서 직접 구현)
#   - embedding_similarity (Vector DB 없이 불가 → keyword만 사용)
#   - deduplication content_hash (MVP는 URL 기준만)

# ─────────────────────────────────────────────────────────────
# Obsidian Vault 설정
# ─────────────────────────────────────────────────────────────
obsidian:
  vault_path: ""   # 환경변수 OBSIDIAN_VAULT_PATH 없을 때 fallback

  vault_subfolders:
    raw:        "01_raw"
    review:     "02_review"
    approved:   "03_approved"
    newsletter: "04_newsletter"   # draft/, published/, ietf_radar.md
    newsletter_used: "06_newsletter_used"  # 발행에 사용된 승인 기사 {issue_date}/

  required_frontmatter_keys:
    - title
    - url
    - source_name
    - published
    - is_vendor


# ─────────────────────────────────────────────────────────────
# 수집 공통 정책
# ─────────────────────────────────────────────────────────────
source_policy:
  max_articles_per_source_per_run: 10
  max_article_age_days: 30
  min_text_length_chars: 800

  deduplication:
    enabled: true
    strategy: "canonical_url"   # MVP: URL 기준. 후속: title_similarity

  relevance_scoring:
    keyword_match_weight: 1.0
    newsletter_include_threshold: 0.3


